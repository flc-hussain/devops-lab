name: Development Pipeline
on:
  push:
    branches: [ develop ]
jobs:
  Deploy-Dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker Image (Proof of Concept)
        run: docker build -t cs-portal-dev .
        
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      - name: Deploy to Vercel (Development)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} && vercel build --token=${{ secrets.VERCEL_TOKEN }} && vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}