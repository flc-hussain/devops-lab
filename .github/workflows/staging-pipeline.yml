name: Staging Pipeline
on:
  push:
    branches: [ release ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: docker build -t cs-portal-qa .
      - name: Deploy to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}