name: Staging Pipeline
on:
  push:
    branches: [ release ]
jobs:
  Deploy-Staging:
    runs-on: ubuntu-latest
    environment: staging
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker Image (Proof of Concept)
        run: docker build -t cs-portal-qa .
        
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      - name: Deploy to Vercel (Staging)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} && vercel build --token=${{ secrets.VERCEL_TOKEN }} && vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}